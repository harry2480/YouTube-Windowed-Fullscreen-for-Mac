<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Windowed Fullscreen</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>YouTube Windowed Fullscreen</h1>
      <p class="version" id="version">v1.0.0</p>
    </div>

    <div class="content">
      <div class="toggle-group">
        <label for="toggle-switch" class="label">機能を有効にする</label>
        <div class="toggle-switch">
          <input
            type="checkbox"
            id="toggle-switch"
            class="toggle-input"
            checked
          />
          <label for="toggle-switch" class="toggle-label"></label>
        </div>
      </div>

      <div class="info">
        <p class="info-text">
          YouTubeの「f」キーでフルスクリーン表示時に、新しいSpaceへの移動を阻止します。
        </p>
      </div>

      <div class="chromeless-group">
        <button type="button" id="chromeless-button" class="chromeless-button">
          クロムレス最大化で開く
        </button>
        <p class="info-text">
          現在のタブを、タブ・アドレスバーの無い最大化ウィンドウで開きます（Spaceは作成しません）。解除は <kbd>⌘⇧F</kbd>（YouTubeは <kbd>Esc</kbd> も可）。
        </p>
      </div>

      <div class="sites-group">
        <h2 class="section-title">クロムレスを許可するサイト</h2>
        <div id="current-site" class="current-site"></div>
        <ul id="sites-list" class="sites-list"></ul>
        <p class="info-text">
          許可したサイトでクロムレス最大化（⌘⇧F）が使えます。YouTube は標準で有効です。
        </p>
      </div>
    </div>

    <div class="footer">
      <p class="footer-text">macOS用 - © 2024</p>
    </div>
  </div>

  <script src="popup.ts" type="module"></script>
</body>
</html>
